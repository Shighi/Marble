services:
  - type: pserv
    name: sentinel-db
    plan: free
    disk:
      name: sentinel-db-data
      sizeGB: 1

  - type: web
    name: sentinel-app
    env: docker
    plan: free
    rootDir: streamlit_app
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: APP_ENV
        value: production
